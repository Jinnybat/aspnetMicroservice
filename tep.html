<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knipper Ecosystem</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f0f6fc;
      --white: #ffffff;
      --blue-dark: #0a4a7c;
      --blue-mid: #1a6aaa;
      --blue: #2e8fd4;
      --blue-lt: #5aade8;
      --blue-pale: #d6eaf8;
      --blue-xs: #eaf4fb;
      --teal: #0e9f9f;
      --green: #1aaa6e;
      --orange: #e07b2a;
      --purple: #7c58c8;
      --amber: #c8920a;
      --gray: #6b8aaa;
      --gray-lt: #b8cfe4;
      --border: #cce0f0;
      --shadow: rgba(10, 74, 124, 0.10);
      --text: #1a3a5c;
      --text-dim: #5a7a9a;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    /* TOP BAR */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: var(--blue-dark);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(10, 74, 124, 0.3);
    }

    #topbar h1 {
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-transform: uppercase;
    }

    #topbar .sub {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 1px;
      border-left: 1px solid rgba(255, 255, 255, 0.18);
      padding-left: 16px;
    }

    .sp {
      flex: 1;
    }

    .btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.85);
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    /* VIEWPORT */
    #viewport {
      position: fixed;
      inset: 54px 0 0 0;
      overflow: hidden;
      cursor: grab;
      background: var(--bg);
      background-image: radial-gradient(circle at 20% 40%, rgba(46, 143, 212, 0.06) 0%, transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(10, 74, 124, 0.05) 0%, transparent 50%);
    }

    #viewport.dragging {
      cursor: grabbing;
    }

    #world {
      position: absolute;
      transform-origin: 0 0;
    }

    svg#lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 9000px;
      height: 7000px;
      pointer-events: none;
      overflow: visible;
    }

    /* NODES */
    .node {
      position: absolute;
      transform: translate(0, -50%);
      cursor: pointer;
    }

    .node-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px 11px 18px;
      min-width: 158px;
      max-width: 190px;
      box-shadow: 0 2px 12px var(--shadow);
      position: relative;
      transition: box-shadow 0.2s, transform 0.15s;
      user-select: none;
    }

    .node:hover .node-card {
      box-shadow: 0 6px 24px rgba(10, 74, 124, 0.15);
      transform: translateY(-2px);
    }

    .node.selected .node-card {
      border-color: var(--node-color, var(--blue));
      box-shadow: 0 0 0 3px rgba(46, 143, 212, 0.18), 0 6px 20px var(--shadow);
    }

    .node-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 4px;
      border-radius: 0 2px 2px 0;
      background: var(--node-color, var(--blue));
    }

    .node-code {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 12.5px;
      color: var(--node-color, var(--blue-dark));
      letter-spacing: 0.3px;
    }

    .node-label {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      line-height: 1.45;
    }

    .node-portal {
      display: inline-block;
      margin-top: 7px;
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--blue-xs);
      color: var(--blue-mid);
      border: 1px solid var(--blue-pale);
    }

    .node-tbd {
      display: inline-block;
      margin-top: 7px;
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #f8f9fa;
      color: var(--gray);
      border: 1px dashed var(--gray-lt);
      font-style: italic;
    }

    /* expand button on right edge */
    .xbtn {
      position: absolute;
      right: -12px;
      top: 50%;
      transform: translateY(-50%);
      width: 23px;
      height: 23px;
      border-radius: 50%;
      background: var(--node-color, var(--blue));
      color: #fff;
      border: 2.5px solid var(--white);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(10, 74, 124, 0.22);
      transition: transform 0.2s, background 0.2s;
      z-index: 5;
      cursor: pointer;
    }

    .node.open .xbtn {
      background: var(--gray);
    }

    /* ROOT */
    .node-root .node-card {
      background: var(--blue-dark);
      border-color: transparent;
      box-shadow: 0 4px 20px rgba(10, 74, 124, 0.35);
      min-width: 170px;
    }

    .node-root .node-card::before {
      background: rgba(255, 255, 255, 0.5);
    }

    .node-root .node-code {
      color: #fff;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .node-root .node-label {
      color: rgba(255, 255, 255, 0.6);
    }

    /* L1 */
    .node-l1 .node-card {
      background: var(--blue-mid);
      border-color: transparent;
      box-shadow: 0 3px 15px rgba(26, 106, 170, 0.3);
    }

    .node-l1 .node-card::before {
      background: rgba(255, 255, 255, 0.45);
    }

    .node-l1 .node-code {
      color: #fff;
      font-size: 14px;
    }

    .node-l1 .node-label {
      color: rgba(255, 255, 255, 0.65);
    }

    /* DETAIL PANEL */
    #detail {
      position: fixed;
      right: 0;
      top: 54px;
      bottom: 0;
      width: 315px;
      background: var(--white);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(.4, 0, .2, 1);
      z-index: 150;
      overflow-y: auto;
      box-shadow: -4px 0 20px rgba(10, 74, 124, 0.08);
    }

    #detail.open {
      transform: translateX(0);
    }

    .dh {
      background: var(--blue-dark);
      padding: 22px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .dc-btn {
      float: right;
      background: rgba(255, 255, 255, 0.14);
      border: none;
      color: #fff;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dc-btn:hover {
      background: rgba(255, 255, 255, 0.26);
    }

    .d-code {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 19px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .d-full {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
      line-height: 1.5;
    }

    .d-body {
      padding: 20px;
    }

    .d-sec {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin: 18px 0 7px;
      font-weight: 600;
    }

    .d-desc {
      font-size: 12px;
      line-height: 1.8;
      color: var(--text);
    }

    .d-portal {
      display: block;
      margin-top: 10px;
      padding: 9px 13px;
      background: var(--blue-xs);
      border: 1px solid var(--blue-pale);
      border-radius: 6px;
      font-size: 11px;
      color: var(--blue-mid);
      text-decoration: none;
    }

    .d-portal:hover {
      background: var(--blue-pale);
    }

    .d-div {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .tag {
      display: inline-block;
      font-size: 9px;
      padding: 3px 9px;
      border-radius: 3px;
      margin: 2px;
      border: 1px solid;
    }

    .ta {
      color: #0e7e4a;
      border-color: #b7e8d0;
      background: #edfaf3;
    }

    .tl {
      color: #9a5200;
      border-color: #f5d9aa;
      background: #fef6ea;
    }

    .tn {
      color: #0e5e9a;
      border-color: #b0d8f5;
      background: #eaf4fb;
    }

    .tt {
      color: var(--gray);
      border-color: var(--gray-lt);
      background: #f5f7fa;
    }

    .child-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 11px;
      border-radius: 6px;
      margin-bottom: 5px;
      cursor: pointer;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text);
      transition: background 0.15s;
    }

    .child-row:hover {
      background: var(--blue-pale);
      border-color: var(--blue-pale);
    }

    .cdot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* LEGEND */
    #legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 16px;
      font-size: 10px;
      color: var(--text-dim);
      box-shadow: 0 2px 12px var(--shadow);
      z-index: 100;
      line-height: 2.1;
    }

    #legend b {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      display: block;
      margin-bottom: 5px;
    }

    .lr {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lb {
      width: 16px;
      height: 3.5px;
      border-radius: 2px;
    }

    /* HINT */
    #hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 15px;
      font-size: 10px;
      color: var(--text-dim);
      box-shadow: 0 2px 12px var(--shadow);
      z-index: 100;
      line-height: 2;
    }

    #hint strong {
      color: var(--text);
    }
  </style>
</head>

<body>

  <div id="topbar">
    <h1>Knipper</h1>
    <span class="sub">Knipper Health — Ecosystem Map</span>
    <div class="sp"></div>
    <button class="btn" onclick="expandAll()">Expand All</button>
    <button class="btn" onclick="collapseAll()">Collapse All</button>
    <button class="btn" onclick="resetView()">⟳ Reset</button>
  </div>

  <div id="viewport">
    <div id="world">
      <svg id="lines">
        <defs></defs>
      </svg>
    </div>
  </div>

  <div id="detail">
    <div class="dh">
      <button class="dc-btn" onclick="closeDetail()">✕</button>
      <div class="d-code" id="d-code"></div>
      <div class="d-full" id="d-full"></div>
    </div>
    <div class="d-body" id="d-body"></div>
  </div>

  <div id="legend">
    <b>Legend</b>
    <div class="lr"><div class="lb" style="background:#0a4a7c"></div>Core System</div>
    <div class="lr"><div class="lb" style="background:#1a6aaa"></div>Platform Brand</div>
    <div class="lr"><div class="lb" style="background:#2e8fd4"></div>Active Channel</div>
    <div class="lr"><div class="lb" style="background:#e07b2a"></div>Pending Channel</div>
    <div class="lr"><div class="lb" style="background:#c8920a"></div>Infrastructure</div>
    <div class="lr"><div class="lb" style="background:#7c58c8"></div>Reporting / Analytics</div>
    <div class="lr"><div class="lb" style="background:#c8920a;opacity:0.6;background-image:repeating-linear-gradient(90deg,#c8920a 0,#c8920a 5px,transparent 5px,transparent 9px);background-color:transparent;border:none"></div>Shared dependency</div>
  </div>

  <div id="hint">
    <strong>Click</strong> node to expand / collapse<br>
    <strong>Double-click</strong> for full details<br>
    <strong>Drag</strong> to pan &nbsp;·&nbsp; <strong>Scroll</strong> to zoom
  </div>

  <script>
    // ── TREE DATA ────────────────────────────────────────────────────────────────
    /** Minimal typedef for better DX (optional JSDoc)
   * @typedef {Object} Node
   * @property {string} id
   * @property {string} code
   * @property {string} label
   * @property {string} color
   * @property {string} [cls]
   * @property {Object} d
   * @property {string} d.full
   * @property {string} d.desc
   * @property {Array<{l: string, c: string}>} [d.tags]
   * @property {string} [portal]
   * @property {string} [portalUrl]
   * @property {Node[]} ch
   */

    // ------------ Shared constants -------------
    const C = {
      root: '#0a4a7c',
      l1: '#1a6aaa',
      channel: '#2e8fd4',
      teal: '#0e9f9f',
      infra: '#c8920a',
      kfis: '#1aaa6e',
      kad: '#7c58c8',
      orange: '#e07b2a',
    };

    const TAG = {
      Active: { l: 'Active', c: 'ta' },
      Operational: { l: 'Operational', c: 'ta' },
      Pending: { l: 'Pending', c: 'tt' },
      PortalTBD: { l: 'Portal TBD', c: 'tt' },
      Legacy: { l: 'Legacy', c: 'tl' },
      Latest: { l: 'Latest', c: 'tn' },
      SIMS1: { l: 'SIMS 1.0 Legacy', c: 'tl' },
      SIMS3: { l: 'SIMS 3.0 Latest', c: 'tn' },
    };

    // Small helper to reduce boilerplate
    const mk = (o) => o;

    // ------------ Reusable subtrees -------------
    function simsSubtree() {
      return mk({
        id: 'sims', code: 'SA / SIMS', label: 'Sample Accountability', color: C.infra, portal: 'client.sims.knipper.com',
        d: {
          full: 'Sample Inventory Management System',
          desc: 'PDMA-compliant sample accountability with full audit trail from manufacturer to final recipient.',
          portalUrl: 'http://client.sims.knipper.com',
          tags: [TAG.SIMS1, TAG.SIMS3],
        },
        ch: [
          mk({ id: 'sims1', code: 'SIMS 1.0', label: 'Legacy platform (being phased out)', color: C.infra, d: { full: 'SIMS 1.0 — Legacy Platform', desc: 'Original SIMS; retained for historical/legacy data. Being phased out for SIMS 3.0.', tags: [TAG.Legacy] }, ch: [] }),
          mk({ id: 'sims3', code: 'SIMS 3.0', label: 'Current active platform', color: C.infra, d: { full: 'SIMS 3.0 — Current Platform', desc: 'Active platform at client.sims.knipper.com with compliant tracking, reconciliation, and audit reporting.', tags: [TAG.Latest, TAG.Active] }, ch: [] }),
          mk({ id: 'sims-a', code: 'PDMA Audit Trail', label: 'Compliance & audit reporting', color: C.infra, d: { full: 'PDMA Compliance & Audit Trail', desc: 'Audit trail with practitioner signatures, lot tracking, and regulatory reporting.' }, ch: [] }),
        ],
      });
    }

    function kfisSubtree() {
      return mk({
        id: 'kfis', code: 'KFIS', label: 'Knipper Fulfillment Information System', color: C.kfis,
        d: { full: 'Knipper Fulfillment Information System', desc: 'Business rules and order processing engine for compliant, accurate distribution across all channels.', tags: [TAG.Operational] },
        ch: [
          mk({ id: 'kfis-r', code: 'Rules Engine', label: 'Order eligibility & validation', color: C.kfis, d: { full: 'Business Rules Engine', desc: 'Eligibility, quantity limits, geos, allocations, and compliance holds.' }, ch: [] }),
          mk({ id: 'kfis-o', code: 'Order Processing', label: 'Full lifecycle order management', color: C.kfis, d: { full: 'Order Processing Engine', desc: 'From submission through validation, pick-pack, routing, and delivery confirmation.' }, ch: [] }),
          mk({ id: 'kfis-d', code: 'Distribution Mgmt', label: 'Compliant & accurate fulfillment', color: C.kfis, d: { full: 'Compliant Distribution Management', desc: 'Automated holds and escalation workflows for compliance exceptions.' }, ch: [] }),
        ],
      });
    }

    function omsSubtree() {
      return mk({
        id: 'oms', code: 'OMS', label: 'Order Management System', color: C.teal,
        d: { full: 'Order Management System', desc: 'Order orchestration layer ensuring timely, accurate, compliant distribution.', tags: [TAG.Operational] },
        ch: [
          mk({ id: 'oms-r', code: 'Rules Engine', label: 'Order eligibility & validation', color: C.teal, d: { full: 'Business Rules Engine', desc: 'Configurable rule sets for processing.' }, ch: [] }),
          mk({
            id: 'oms-o', code: 'Order Processing', label: 'Full lifecycle order management', color: C.teal,
            d: { full: 'Order Processing Engine', desc: 'Validation, pick-pack, routing, delivery confirmation.' },
            ch: [
              mk({
                id: 'wms', code: 'WMS', label: 'Warehouse Management System', color: C.teal,
                d: { full: 'Warehouse Management System', desc: 'Inventory, pick/pack/ship, and DC execution.' },
                ch: [mk({ id: 'wms-o', code: 'Order Processing', label: 'Full lifecycle order management', color: C.teal, d: { full: 'Order Processing Engine', desc: 'Executes warehouse steps reliably.' }, ch: [] })],
              }),
            ],
          }),
          mk({ id: 'oms-d', code: 'Distribution Mgmt', label: 'Compliant & accurate fulfillment', color: C.teal, d: { full: 'Compliant Distribution Management', desc: 'Regulatory and contractual adherence.' }, ch: [] }),
        ],
      });
    }

    function kadabraSubtree() {
      return mk({
        id: 'kadabra', code: 'KADABRA', label: 'Advanced Analytics & Reporting', color: C.kad,
        d: { full: 'Knipper Advanced Data Analytics Business Reporting Application', desc: 'Enterprise reporting across the Samplicity ecosystem.', tags: [TAG.Operational] },
        ch: [
          mk({ id: 'kad-d', code: 'Dashboards', label: 'Real-time KPI & performance views', color: C.kad, d: { full: 'Executive Dashboards', desc: 'KPI throughput, compliance, inventory status.' }, ch: [] }),
          mk({ id: 'kad-r', code: 'Reports', label: 'Standard & scheduled reports', color: C.kad, d: { full: 'Standard Report Library', desc: 'PDMA, inventory, rep performance, channel analytics.' }, ch: [] }),
        ],
      });
    }

    function coreInfrastructureNode() {
      return mk({
        id: 'infra', code: 'INFRASTRUCTURE', label: 'Core Infrastructure', color: C.infra,
        d: { full: 'Core Infrastructure Systems', desc: 'SIMS (accountability), KFIS (fulfillment), OMS (orchestration), and KADABRA (analytics).' },
        ch: [simsSubtree(), kfisSubtree(), omsSubtree(), kadabraSubtree()],
      });
    }

    // Portal children — Sample Requests gets a ref link to infra (no child tree)
    function portalChildren(baseColor, ns) {
      return [
        mk({
          id: `${ns}-sample-requests`, code: 'Sample Requests', label: 'Browse & request product samples', color: baseColor,
          d: { full: 'Sample Request Management', desc: 'Requests flow into KFIS for validation and fulfillment.' },
          refTo: 'infra',   // ← cross-link target; not a real child
          ch: [],
        }),
        mk({ id: `${ns}-products`, code: 'Products', label: 'Support materials & product info', color: baseColor, d: { full: 'Literature & Support Materials', desc: 'Product literature, PI, and educational materials.' }, ch: [] }),
        mk({ id: `${ns}-history`, code: 'Order History', label: 'Track orders & delivery status', color: baseColor, d: { full: 'Order History & Tracking', desc: 'History and tracking tied into SIMS accountability.' }, ch: [] }),
      ];
    }

    // ------------ Tree -------------
    const T = mk({
      id: 'msm', code: 'MSM', label: 'Marketing & Sample Management', color: C.root, cls: 'node-root',
      d: {
        full: 'Marketing and Sample Management',
        desc: 'The MSM/Samplicity platform provides end-to-end pharmaceutical sample distribution across all channels.',
        tags: [{ l: 'Core Platform', c: 'ta' }],
      },
      ch: [
        mk({
          id: 'samplicity', code: 'SAMPLICITY', label: 'Unified Brand Ecosystem', color: C.l1, cls: 'node-l1',
          d: {
            full: 'Samplicity Ecosystem',
            desc: 'Brand umbrella unifying all channels and infrastructure under a single strategy.',
            tags: [{ l: 'Brand Umbrella', c: 'ta' }],
          },
          ch: [
            // Distribution Channels
            mk({
              id: 'channels', code: 'CHANNELS', label: 'Distribution Channels', color: C.channel,
              d: {
                full: 'Distribution Channels',
                desc: 'Four channels route samples and materials to practitioners, representatives, consumers, and hospitals.',
              },
              ch: [
                // DTP
                mk({
                  id: 'dtp', code: 'DTP', label: 'Direct to Practitioner', color: C.channel, portal: 'MySampleCloset.com',
                  d: {
                    full: 'Direct to Practitioner',
                    desc: 'E‑sampling portal enabling HCPs to request samples and materials directly.',
                    portalUrl: 'https://MySampleCloset.com',
                    tags: [TAG.Active, TAG.Operational],
                  },
                  ch: [
                    mk({
                      id: 'msc', code: 'MySampleCloset.com', label: 'Practitioner Portal', color: C.channel,
                      d: {
                        full: 'MySampleCloset.com — Practitioner Portal',
                        desc: 'HCPs browse, submit requests, view history, and access literature.',
                      },
                      ch: portalChildren(C.channel, 'dtp'),
                    }),
                  ],
                }),

                // DTR
                mk({
                  id: 'dtr', code: 'DTR', label: 'Direct to Representative', color: C.teal, portal: 'MyRepCenter.com',
                  d: {
                    full: 'Direct to Representative',
                    desc: 'Business rule–based sales rep portal for ordering samples and literature; reps manage inventory and PDMA compliance.',
                    portalUrl: 'https://MyRepCenter.com',
                    tags: [TAG.Active, TAG.Operational],
                  },
                  ch: [
                    mk({
                      id: 'mrc', code: 'MyRepCenter.com', label: 'Sales Rep Portal', color: C.teal,
                      d: {
                        full: 'MyRepCenter.com — Sales Rep Portal',
                        desc: 'Reps manage sample inventory, place orders, distribute to HCPs, and comply with PDMA.',
                      },
                      ch: portalChildren(C.teal, 'dtr'),
                    }),
                  ],
                }),

                // DTC
                mk({
                  id: 'dtc', code: 'DTC', label: 'Direct to Consumer', color: C.orange, portal: 'TBD',
                  d: {
                    full: 'Direct to Consumer',
                    desc: 'Integrated patient portal for OTC ordering. Platform under evaluation.',
                    tags: [TAG.Pending, TAG.PortalTBD],
                  },
                  ch: [
                    mk({
                      id: 'dtc-p', code: 'Consumer Portal', label: 'Platform pending selection', color: C.orange,
                      d: { full: 'Consumer Portal — TBD', desc: 'Will integrate with KFIS (orders) and SIMS (tracking).' },
                      ch: [],
                    }),
                    mk({
                      id: 'dtc-o', code: 'OTC Direct Orders', label: 'Direct manufacturer to patient ordering', color: C.orange,
                      d: { full: 'OTC Medication Direct Ordering', desc: 'Consumers browse and order OTC directly from manufacturer.' },
                      ch: [],
                    }),
                  ],
                }),

                // DTH
                mk({
                  id: 'dth', code: 'DTH', label: 'Direct to Hospital', color: C.kad, portal: 'TBD',
                  d: {
                    full: 'Direct to Hospital',
                    desc: 'Hospital-focused distribution to health systems and pharmacy departments.',
                    tags: [TAG.Pending, TAG.PortalTBD],
                  },
                  ch: [
                    mk({
                      id: 'dth-p', code: 'Hospital Portal', label: 'Institutional portal (TBD)', color: C.kad,
                      d: { full: 'Hospital Portal — TBD', desc: 'Bulk ordering, formulary integration, pharmacy workflows.' },
                      ch: [],
                    }),
                    mk({
                      id: 'dth-f', code: 'Formulary Integ.', label: 'Approved formulary list integration', color: C.kad,
                      d: { full: 'Hospital Formulary Integration', desc: 'Planned integration to streamline requisitions.' },
                      ch: [],
                    }),
                  ],
                }),

                // Third Party
                mk({
                  id: 'tp', code: 'THIRD PARTY', label: 'Third Party Orders', color: C.orange, portal: 'Knipper SFTP',
                  d: {
                    full: 'Third Party Orders',
                    desc: 'Orders received via partner channels or batch interfaces.',
                    tags: [TAG.Operational],
                  },
                  refTo: 'infra',   // ← cross-link to shared INFRASTRUCTURE
                  ch: [],
                }),
              ],
            }),

          ],
        }),
      ],
    });

    // --- Optional: enable true lazy loading in large trees ---
    // Example: replace `ch: [coreInfrastructureNode()]` with:
    //   lazyCh: () => [coreInfrastructureNode()]
    // and adjust your renderer to call node.lazyCh?.() on expand.

    // ── FLOATING NODES (outside tree, positioned dynamically) ────────────────────
    // These are standalone nodes not part of the tree hierarchy.
    // Position is computed each render based on where refTo sources are.
    const FLOATS = [coreInfrastructureNode()];

    // ── CONSTANTS ────────────────────────────────────────────────────────────────
    const NW = 186, HGAP = 72, VGAP = 16;
    // Lines start from the xbtn circle center (right: -12px, width: 23px → center 11.5px beyond card edge)
    // and end at the target node's left edge.
    const LINE_X_OFFSET = 11; // px beyond NW to reach xbtn center

    // ── STATE ────────────────────────────────────────────────────────────────────
    const open = new Set([]);
    let sel = null, els = {}, pos = {};
    let pan = { x: 80, y: 40 }, zoom = 1;
    let drag = false, ds = { x: 0, y: 0 }, ps = { x: 0, y: 0 };

    // ── NODE HEIGHT ───────────────────────────────────────────────────────────────
    function nh(n) {
      if (n.cls === 'node-root') return 70;
      if (n.cls === 'node-l1') return 64;
      if (n.portal) return 80;
      return 64;
    }

    // ── LAYOUT ───────────────────────────────────────────────────────────────────
    function subH(n) {
      if (!open.has(n.id) || !n.ch.length) return nh(n);
      let t = 0; n.ch.forEach((c, i) => { t += subH(c); if (i < n.ch.length - 1) t += VGAP; });
      return Math.max(t, nh(n));
    }

    function layout(n, x, y) {
      const h = nh(n), bH = subH(n);
      pos[n.id] = { x, y: y + (bH - h) / 2, h, bH };
      if (open.has(n.id) && n.ch.length) {
        const cx = x + NW + LINE_X_OFFSET + HGAP; let cy = y;
        n.ch.forEach(c => { layout(c, cx, cy); cy += subH(c) + VGAP; });
      }
    }

    function floatSubH(n) {
      if (!open.has(n.id) || !n.ch.length) return nh(n);
      let t = 0; n.ch.forEach((c, i) => { t += floatSubH(c); if (i < n.ch.length - 1) t += VGAP; });
      return Math.max(t, nh(n));
    }

    function layoutFloat(n, x, y) {
      const h = nh(n), bH = floatSubH(n);
      pos[n.id] = { x, y: y + (bH - h) / 2, h, bH };
      if (open.has(n.id) && n.ch.length) {
        const cx = x + NW + LINE_X_OFFSET + HGAP; let cy = y;
        n.ch.forEach(c => { layoutFloat(c, cx, cy); cy += floatSubH(c) + VGAP; });
      }
    }

    function computeLayout() {
      pos = {};
      const vh = window.innerHeight - 54;
      const rH = subH(T);
      const sy = Math.max(40, (vh / zoom - rH) / 2);
      layout(T, 40, sy);

      // Position each float only when at least one source is visible
      FLOATS.forEach(fn => {
        // Find all visible nodes that refTo this float
        const sources = [];
        function collectSources(n) {
          if (n.refTo === fn.id && pos[n.id]) sources.push(pos[n.id]);
          if (open.has(n.id)) n.ch.forEach(collectSources);
        }
        collectSources(T);

        // No visible sources → don't add to pos at all (float stays hidden)
        if (sources.length === 0) return;

        // Find rightmost X across all positioned tree nodes
        let maxX = 40;
        Object.values(pos).forEach(p => { if (p.x > maxX) maxX = p.x; });

        const fx = maxX + NW + LINE_X_OFFSET + HGAP * 2;
        const avgY = sources.reduce((s, p) => s + p.y + p.h / 2, 0) / sources.length;
        const fy = avgY - floatSubH(fn) / 2;
        layoutFloat(fn, fx, fy);
      });
    }

    // ── RENDER ────────────────────────────────────────────────────────────────────
    function render() {
      computeLayout();
      const world = document.getElementById('world');
      const svg = document.getElementById('lines');
      world.style.transform = `translate(${pan.x}px,${pan.y}px) scale(${zoom})`;

      // clear lines
      const defs = svg.querySelector('defs');
      svg.innerHTML = ''; svg.appendChild(defs);

      // Shared arrowhead marker — refX=7 so tip aligns exactly with path endpoint
      function addArrowMarker(id, color, opacity) {
        const m = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        m.setAttribute('id', id);
        m.setAttribute('markerWidth', '7'); m.setAttribute('markerHeight', '7');
        m.setAttribute('refX', '7'); m.setAttribute('refY', '3.5');
        m.setAttribute('orient', 'auto');
        const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        pl.setAttribute('points', '0 0,7 3.5,0 7');
        pl.setAttribute('fill', color); pl.setAttribute('opacity', opacity || '0.65');
        m.appendChild(pl); defs.appendChild(m);
        return id;
      }

      // Remove DOM nodes that are no longer visible
      const visIds = new Set(Object.keys(pos));
      Object.keys(els).forEach(id => { if (!visIds.has(id)) { els[id].remove(); delete els[id]; } });

      // ── RENDER NODES FIRST so we can read real DOM widths for line origins ─────
      function renderNode(n) {
        if (!pos[n.id]) return;
        const p = pos[n.id];
        let el = els[n.id];
        if (!el) { el = mkEl(n); world.appendChild(el); els[n.id] = el; }
        el.style.left = p.x + 'px';
        el.style.top = (p.y + p.h / 2) + 'px';
        const isOpen = open.has(n.id) && (n.ch.length > 0 || n.refTo);
        el.classList.toggle('open', isOpen);
        el.classList.toggle('selected', sel === n.id);
        const xbtn = el.querySelector('.xbtn');
        if (xbtn) xbtn.textContent = isOpen ? '−' : '+';
        // Measure real card width from DOM; xbtn (right:-12px, w:23px) center = card_right - 0.5
        const card = el.querySelector('.node-card');
        p.lineX = p.x + (card ? card.offsetWidth : NW) + (xbtn ? 11 : 0);
        if (open.has(n.id)) n.ch.forEach(renderNode);
      }
      renderNode(T);

      // Pre-scan refTo to know which floats have visible sources
      const floatsWithSources = new Set();
      function scanRefTo(n) {
        if (n.refTo && pos[n.id] && open.has(n.id)) floatsWithSources.add(n.refTo);
        if (open.has(n.id)) n.ch.forEach(scanRefTo);
      }
      scanRefTo(T);

      FLOATS.forEach(fn => {
        if (floatsWithSources.has(fn.id)) {
          renderNode(fn);
        } else {
          function hideFloat(n) { if (els[n.id]) { els[n.id].remove(); delete els[n.id]; } n.ch.forEach(hideFloat); }
          hideFloat(fn);
        }
      });

      // ── DRAW LINES using real p.lineX ─────────────────────────────────────────
      function drawLines(n) {
        if (!open.has(n.id) || !n.ch.length) return;
        const p = pos[n.id];
        n.ch.forEach(c => {
          const cp = pos[c.id]; if (!p || !cp) return;
          const x1 = p.lineX ?? (p.x + NW), y1 = p.y + p.h / 2;
          const x2 = cp.x, y2 = cp.y + cp.h / 2;
          const mx = (x1 + x2) / 2;
          const color = c.color || '#2e8fd4';
          const arrowId = `arr-${c.id.replace(/[^a-z0-9]/g, '')}`;
          addArrowMarker(arrowId, color, '0.65');
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', `M ${x1} ${y1} C ${mx} ${y1},${mx} ${y2},${x2} ${y2}`);
          path.setAttribute('stroke', color);
          path.setAttribute('stroke-width', '1.8');
          path.setAttribute('fill', 'none');
          path.setAttribute('opacity', '0.5');
          path.setAttribute('marker-end', `url(#${arrowId})`);
          svg.appendChild(path);
          drawLines(c);
        });
      }
      drawLines(T);
      FLOATS.forEach(fn => { if (floatsWithSources.has(fn.id)) drawLines(fn); });

      // ── CROSS-LINKS (refTo) — funnel pattern ─────────────────────────────────
      // Group all refTo sources by their target float, then draw as a funnel:
      // each source → merge point → single arrow into target.
      const refGroups = {}; // targetId → [{x1,y1,node}]
      function collectRefs(n) {
        if (n.refTo && pos[n.id] && open.has(n.id) && pos[n.refTo]) {
          if (!refGroups[n.refTo]) refGroups[n.refTo] = [];
          const sp = pos[n.id];
          refGroups[n.refTo].push({ x1: sp.lineX ?? (sp.x + NW), y1: sp.y + sp.h / 2, node: n });
        }
        if (open.has(n.id)) n.ch.forEach(collectRefs);
      }
      collectRefs(T);

      Object.entries(refGroups).forEach(([targetId, sources]) => {
        const tp = pos[targetId];
        if (!tp) return;
        const x2 = tp.x, y2 = tp.y + tp.h / 2;

        // Merge point: just 30px before INFRASTRUCTURE's left edge, at target's Y
        const mergeX = x2 - 30;
        const mergeY = y2;

        // Each branch travels from its source to the merge point independently,
        // curving horizontally first so they don't overlap other nodes
        sources.forEach(({ x1, y1 }) => {
          const branch = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          const dx = mergeX - x1;
          branch.setAttribute('d', `M ${x1} ${y1} C ${x1 + dx * 0.6} ${y1}, ${mergeX - dx * 0.1} ${mergeY}, ${mergeX} ${mergeY}`);
          branch.setAttribute('stroke', C.infra);
          branch.setAttribute('stroke-width', '1.4');
          branch.setAttribute('stroke-dasharray', '5,4');
          branch.setAttribute('fill', 'none');
          branch.setAttribute('opacity', '0.55');
          svg.appendChild(branch);
        });

        // Short trunk with arrowhead from merge point into INFRASTRUCTURE
        const arrowId = `xarr-merged-${targetId.replace(/[^a-z0-9]/g, '')}`;
        addArrowMarker(arrowId, C.infra, '0.9');
        const trunk = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        trunk.setAttribute('d', `M ${mergeX} ${mergeY} L ${x2} ${y2}`);
        trunk.setAttribute('stroke', C.infra);
        trunk.setAttribute('stroke-width', '2');
        trunk.setAttribute('stroke-dasharray', '5,4');
        trunk.setAttribute('fill', 'none');
        trunk.setAttribute('opacity', '0.85');
        trunk.setAttribute('marker-end', `url(#${arrowId})`);
        svg.appendChild(trunk);
      });
    }

    // ── BUILD ELEMENT ─────────────────────────────────────────────────────────────
    function mkEl(n) {
      const div = document.createElement('div');
      div.className = 'node' + (n.cls ? ' ' + n.cls : '');
      div.dataset.id = n.id;
      div.style.setProperty('--node-color', n.color);

      let h = `<div class="node-card">`;
      h += `<div class="node-code">${n.code}</div>`;
      if (n.label) h += `<div class="node-label">${n.label.replace(/\n/g, '<br>')}</div>`;
      if (n.portal === 'TBD') h += `<span class="node-tbd">Portal TBD</span>`;
      else if (n.portal) h += `<span class="node-portal">↗ ${n.portal}</span>`;
      if (n.refTo) h += `<span class="node-portal" style="background:rgba(200,146,10,0.1);color:#c8920a;border-color:rgba(200,146,10,0.3)">⇢ INFRASTRUCTURE</span>`;
      if (n.ch.length || n.refTo) h += `<div class="xbtn">${open.has(n.id) ? '−' : '+'}</div>`;
      h += `</div>`;
      div.innerHTML = h;

      let clks = 0, ct;
      div.addEventListener('click', e => {
        e.stopPropagation(); clks++;
        if (clks === 1) {
          ct = setTimeout(() => {
            clks = 0;
            if (n.ch.length || n.refTo) {
              if (open.has(n.id)) { open.delete(n.id); if (n.ch.length) n.ch.forEach(c => collapse(c)); }
              else open.add(n.id);
              sel = n.id; render();
            } else { showDetail(n); }
          }, 220);
        } else { clearTimeout(ct); clks = 0; showDetail(n); }
      });
      return div;
    }

    function collapse(n) { open.delete(n.id); n.ch.forEach(collapse); }

    function find(n, id) { if (n.id === id) return n; for (const c of n.ch) { const f = find(c, id); if (f) return f; } return null; }
    function findNode(id) {
      const r = find(T, id); if (r) return r;
      for (const fn of FLOATS) { const r2 = find(fn, id); if (r2) return r2; }
      return null;
    }

    // ── DETAIL ────────────────────────────────────────────────────────────────────
    function showDetail(n) {
      sel = n.id; render();
      document.getElementById('d-code').textContent = n.code;
      document.getElementById('d-full').textContent = n.d.full || '';
      let b = '';
      if (n.portal && n.portal !== 'TBD') b += `<a class="d-portal" href="${n.d.portalUrl || '#'}" target="_blank">↗ ${n.portal}</a>`;
      if (n.portal === 'TBD') b += `<div style="font-size:11px;color:var(--gray);padding:9px 12px;background:#f8f9fa;border-radius:5px;border:1px dashed var(--gray-lt);margin-top:6px">⧗ Portal — To Be Identified</div>`;
      b += `<div class="d-div"></div><div class="d-sec">Description</div><div class="d-desc">${n.d.desc || ''}</div>`;
      if (n.d.tags && n.d.tags.length) {
        b += `<div class="d-div"></div><div class="d-sec">Status</div>`;
        n.d.tags.forEach(t => b += `<span class="tag ${t.c}">${t.l}</span>`);
      }
      if (n.ch.length) {
        b += `<div class="d-div"></div><div class="d-sec">Subsystems (${n.ch.length})</div>`;
        n.ch.forEach(c => {
          b += `<div class="child-row" onclick="focusNode('${c.id}')">
        <div class="cdot" style="background:${c.color}"></div>
        <div><strong style="font-size:11px">${c.code}</strong><br>
        <span style="font-size:10px;color:var(--text-dim)">${(c.label || '').replace(/\n/g, ' ')}</span></div>
      </div>`;
        });
      }
      document.getElementById('d-body').innerHTML = b;
      document.getElementById('detail').classList.add('open');
    }

    function closeDetail() { document.getElementById('detail').classList.remove('open'); sel = null; render(); }
    function focusNode(id) { const n = findNode(id); if (!n) return; if (n.ch.length) { open.add(n.id); render(); } showDetail(n); }


    // ── PAN & ZOOM ────────────────────────────────────────────────────────────────
    const vp = document.getElementById('viewport');
    vp.addEventListener('mousedown', e => {
      if (e.target.closest('.node')) return;
      drag = true; ds = { x: e.clientX, y: e.clientY }; ps = { ...pan }; vp.classList.add('dragging');
    });
    window.addEventListener('mousemove', e => { if (!drag) return; pan.x = ps.x + e.clientX - ds.x; pan.y = ps.y + e.clientY - ds.y; render(); });
    window.addEventListener('mouseup', () => { drag = false; vp.classList.remove('dragging'); });
    vp.addEventListener('wheel', e => {
      e.preventDefault();
      const d = e.deltaY > 0 ? 0.92 : 1.08;
      const r = vp.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      pan.x = mx - (mx - pan.x) * d; pan.y = my - (my - pan.y) * d;
      zoom = Math.max(0.2, Math.min(3, zoom * d)); render();
    }, { passive: false });

    // ── CONTROLS ──────────────────────────────────────────────────────────────────
    function expandAll() {
      function a(n) { if (n.ch.length) open.add(n.id); n.ch.forEach(a); }
      a(T); FLOATS.forEach(a); render();
    }
    function collapseAll() {
      open.clear();
      Object.values(els).forEach(e => e.remove()); els = {}; render();
    }
    function resetView() {
      zoom = 1; pan = { x: 80, y: 40 };
      open.clear();
      Object.values(els).forEach(e => e.remove()); els = {}; render();
    }

    // touch
    let ld = null;
    vp.addEventListener('touchstart', e => {
      if (e.touches.length === 2) ld = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      else if (!e.target.closest('.node')) { drag = true; ds = { x: e.touches[0].clientX, y: e.touches[0].clientY }; ps = { ...pan }; }
    });
    vp.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (ld) { zoom = Math.max(0.2, Math.min(3, zoom * d / ld)); render(); } ld = d;
      } else if (drag) { pan.x = ps.x + e.touches[0].clientX - ds.x; pan.y = ps.y + e.touches[0].clientY - ds.y; render(); }
    }, { passive: false });
    vp.addEventListener('touchend', () => { drag = false; ld = null; });

    window.addEventListener('resize', render);

    // ── INIT ──────────────────────────────────────────────────────────────────────
    render();
  </script>
</body>
