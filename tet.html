<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samplicity Ecosystem — Interactive Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #07101f;
    --surface:  #0d1a2e;
    --panel:    #112036;
    --border:   #1a3050;
    --teal:     #0eb8cc;
    --teal-dim: #0d7c8a;
    --green:    #2ecc8f;
    --orange:   #f47c3b;
    --purple:   #9b6ddf;
    --amber:    #e8a838;
    --sky:      #38b2f4;
    --text:     #c8ddf0;
    --dim:      #4a6880;
    --glow-t:   rgba(14,184,204,0.35);
    --glow-g:   rgba(46,204,143,0.35);
    --glow-o:   rgba(244,124,59,0.35);
    --glow-p:   rgba(155,109,223,0.35);
    --glow-a:   rgba(232,168,56,0.35);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    overflow: hidden;
  }

  /* ── CANVAS ── */
  #canvas {
    width: 100%; height: 100%;
    position: relative;
    cursor: grab;
    user-select: none;
  }
  #canvas.dragging { cursor: grabbing; }

  svg#lines {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }

  /* ── NODES ── */
  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: filter 0.2s, transform 0.2s;
  }
  .node:hover { transform: translate(-50%, -50%) scale(1.06); }
  .node.collapsed .node-children-hint { opacity: 1; }

  .node-box {
    border-radius: 10px;
    border: 1.5px solid;
    padding: 10px 16px;
    text-align: center;
    position: relative;
    backdrop-filter: blur(6px);
    transition: box-shadow 0.25s, border-color 0.25s;
  }
  .node:hover .node-box {
    box-shadow: 0 0 28px var(--node-glow, rgba(14,184,204,0.4));
  }

  .node-code {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    color: var(--node-color, var(--teal));
  }
  .node-label {
    font-size: 9px;
    color: var(--dim);
    margin-top: 2px;
    line-height: 1.4;
    max-width: 130px;
  }
  .node-portal {
    font-size: 8px;
    margin-top: 5px;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid;
    color: var(--node-color, var(--teal));
    border-color: var(--node-color, var(--teal));
    opacity: 0.75;
  }

  /* expand/collapse indicator */
  .expand-badge {
    position: absolute;
    top: -9px; right: -9px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--node-color, var(--teal));
    color: #07101f;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: transform 0.2s;
    font-family: 'Rajdhani', sans-serif;
  }
  .node.open .expand-badge { transform: rotate(45deg); }

  /* Root node special */
  .node-root .node-box {
    padding: 14px 22px;
    border-width: 2px;
  }
  .node-root .node-code { font-size: 20px; letter-spacing: 3px; }

  /* ── DETAIL PANEL ── */
  #detail {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 320px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 28px 24px;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    z-index: 100;
    overflow-y: auto;
  }
  #detail.open { transform: translateX(0); }

  .detail-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: 1px solid var(--border);
    color: var(--dim); cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 5px;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .detail-close:hover { border-color: var(--teal); color: var(--teal); }

  .detail-badge {
    display: inline-block;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .detail-full {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .detail-divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }
  .detail-section-title {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .detail-desc {
    font-size: 11px;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 14px;
  }
  .detail-portal {
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 5px;
    border: 1px solid;
    margin-bottom: 10px;
    display: inline-block;
  }
  .detail-tag {
    display: inline-block;
    font-size: 8.5px;
    padding: 3px 8px;
    border-radius: 3px;
    margin: 3px 3px 3px 0;
    border: 1px solid;
  }
  .tag-legacy { color: var(--orange); border-color: var(--orange); background: rgba(244,124,59,0.08); }
  .tag-latest { color: var(--green); border-color: var(--green); background: rgba(46,204,143,0.08); }
  .tag-tbd    { color: var(--dim);   border-color: var(--dim);   background: transparent; }
  .tag-active { color: var(--teal);  border-color: var(--teal);  background: rgba(14,184,204,0.08); }

  /* ── CONTROLS ── */
  #controls {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    z-index: 50;
  }
  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    transition: border-color 0.2s, color 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--teal); color: var(--teal); }

  /* ── BREADCRUMB ── */
  #breadcrumb {
    position: fixed;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    z-index: 50;
    display: flex; align-items: center; gap: 6px;
  }
  .bc-sep { opacity: 0.4; }

  /* ── LEGEND ── */
  #legend {
    position: fixed;
    bottom: 72px; left: 24px;
    font-size: 9px;
    color: var(--dim);
    z-index: 50;
    line-height: 2;
  }
  .legend-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 5px;
    font-size: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 200;
    max-width: 200px;
    line-height: 1.5;
  }

  /* ── TITLE ── */
  #title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 14px 24px 0;
    display: flex; align-items: center; gap: 14px;
    z-index: 40;
    pointer-events: none;
  }
  #title-bar h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 5px;
    color: var(--teal);
  }
  #title-bar span {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* hint text */
  #hint {
    position: fixed;
    bottom: 72px; right: 24px;
    font-size: 9px;
    color: var(--dim);
    text-align: right;
    line-height: 2;
    z-index: 50;
  }
</style>
</head>

// ─── STATE ──────────────────────────────────────────────────────────────────
const state = {
  openNodes: new Set(['msm', 'samplicity']),
  selectedNode: null,
  pan: { x: 0, y: 0 },
  zoom: 1,
  drag: { active: false, startX: 0, startY: 0, panStart: { x: 0, y: 0 } },

  positions: {}

// ─── LAYOUT ENGINE ──────────────────────────────────────────────────────────
function getVisibleTree(node, depth = 0) {
  const visible = [{ node, depth }];
  if (state.openNodes.has(node.id) && node.children.length > 0) {
    node.children.forEach(child => {
      visible.push(...getVisibleTree(child, depth + 1));
    });
  }
  return visible;
}

function computePositions() {
  const W = window.innerWidth, H = window.innerHeight;
  const cx = W / 2, cy = H / 2;

  // Radial layout
  const positions = {};

  function layout(node, x, y, angle, spread, depth) {
    positions[node.id] = { x, y };
    if (state.openNodes.has(node.id) && node.children.length > 0) {
      const children = node.children;
      const n = children.length;
      const radii = [0, 200, 340, 460, 560];
      const r = radii[Math.min(depth + 1, radii.length - 1)];
      const startAngle = angle - spread / 2;
      children.forEach((child, i) => {
        const childAngle = n === 1 ? angle : startAngle + (spread / (n - 1)) * i;
        const rad = (childAngle * Math.PI) / 180;
        const cx2 = x + r * Math.cos(rad);
        const cy2 = y + r * Math.sin(rad);
        const childSpread = Math.max(30, spread / Math.max(n, 1.5));
        layout(child, cx2, cy2, childAngle, childSpread, depth + 1);
      });
    }
  }

  layout(TREE, cx, cy, -90, 360, 0);
  return positions;
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const positions = computePositions();
  state.positions = positions;
  const canvas = document.getElementById('canvas');
  const svg = document.getElementById('lines');

  // Clear old lines
  svg.innerHTML = '';

  // Remove old nodes not in current visible set
  const visible = getAllVisible(TREE);
  const visibleIds = new Set(visible.map(v => v.id));

  Object.keys(state.nodeEls).forEach(id => {
    if (!visibleIds.has(id)) {
      state.nodeEls[id].remove();
      delete state.nodeEls[id];
    }
  });

  // Draw lines first
  visible.forEach(node => {
    if (node.parentId && positions[node.id] && positions[node.parentId]) {
      const p = toScreen(positions[node.parentId]);
      const c = toScreen(positions[node.id]);
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const mx = (p.x + c.x) / 2;
      const d = `M ${p.x} ${p.y} C ${mx} ${p.y}, ${mx} ${c.y}, ${c.x} ${c.y}`;
      line.setAttribute('d', d);
      line.setAttribute('stroke', node.color || '#1a3050');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('fill', 'none');
      line.setAttribute('opacity', '0.4');
      svg.appendChild(line);
    }
  });

  // Render nodes
  visible.forEach(({ node, depth }) => {
    const pos = positions[node.id];
    if (!pos) return;
    const screen = toScreen(pos);

    let el = state.nodeEls[node.id];
    if (!el) {
      el = createNodeEl(node);
      canvas.appendChild(el);
      state.nodeEls[node.id] = el;
    }

    el.style.left = screen.x + 'px';
    el.style.top = screen.y + 'px';

    // Update open state
    if (node.children.length > 0) {
      el.classList.toggle('open', state.openNodes.has(node.id));
    }

    // Highlight selected
    const box = el.querySelector('.node-box');
    if (state.selectedNode === node.id) {
      box.style.boxShadow = `0 0 32px ${node.glow || 'rgba(14,184,204,0.5)'}`;
      box.style.borderColor = node.color;
    } else {
      box.style.boxShadow = '';
      box.style.borderColor = (node.color || '#0eb8cc') + '55';
    }
  });
}

function getAllVisible(node, parentId = null, result = []) {
  result.push({ node, parentId, color: node.color, depth: 0 });
  if (state.openNodes.has(node.id) && node.children.length > 0) {
    node.children.forEach(child => getAllVisible(child, node.id, result));
  }
  return result;
}

function toScreen(pos) {
  return {
    x: pos.x * state.zoom + state.pan.x,
    y: pos.y * state.zoom + state.pan.y
  };
}

function createNodeEl(node) {
  const div = document.createElement('div');
  div.className = 'node' + (node.id === 'msm' ? ' node-root' : '');
  div.dataset.id = node.id;
  div.style.setProperty('--node-color', node.color || '#0eb8cc');
  div.style.setProperty('--node-glow', node.glow || 'rgba(14,184,204,0.4)');

  const minW = node.id === 'msm' ? 160 : node.id === 'samplicity' ? 150 : 120;

  let inner = `<div class="node-box" style="min-width:${minW}px; border-color:${(node.color||'#0eb8cc')}55; background:${hexToRgba(node.color||'#0eb8cc', 0.06)}">`;
  inner += `<div class="node-code">${node.code}</div>`;
  if (node.label) {
    inner += `<div class="node-label">${node.label.replace(/\n/g,'<br>')}</div>`;
  }
  if (node.portal && node.portal !== 'TBD') {
    inner += `<div class="node-portal">${node.portal}</div>`;
  } else if (node.portal === 'TBD') {
    inner += `<div class="node-portal" style="opacity:0.4; border-style:dashed">TBD</div>`;
  }
  if (node.children.length > 0) {
    inner += `<div class="expand-badge">+</div>`;
  }
  inner += `</div>`;
  div.innerHTML = inner;

  div.addEventListener('click', (e) => {
    e.stopPropagation();
    handleNodeClick(node);
  });

  return div;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─── INTERACTION ────────────────────────────────────────────────────────────
let lastClickId = null, lastClickTime = 0;

function handleNodeClick(node) {
  const now = Date.now();
  if (lastClickId === node.id && now - lastClickTime < 400) {
    // Double click → show detail
    showDetail(node);
    lastClickId = null;
    return;
  }
  lastClickId = node.id;
  lastClickTime = now;

  if (node.children.length > 0) {
    if (state.openNodes.has(node.id)) {
      // Collapse subtree
      collapseSubtree(node);
    } else {
      state.openNodes.add(node.id);
    }
  } else {
    showDetail(node);
  }

  state.selectedNode = node.id;
  render();
}

function collapseSubtree(node) {
  state.openNodes.delete(node.id);
  node.children.forEach(c => collapseSubtree(c));
}

function showDetail(node) {
  state.selectedNode = node.id;
  const d = node.detail || {};
  const color = node.color || '#0eb8cc';
  let html = `<div class="detail-badge" style="color:${color}">${node.code}</div>`;
  html += `<div class="detail-full">${d.full || ''}</div>`;

  if (node.portal && node.portal !== 'TBD') {
    html += `<div class="detail-portal" style="color:${color}; border-color:${color}; background:${hexToRgba(color,0.08)}">↗ ${node.portal}</div>`;
  }
  if (node.portal === 'TBD') {
    html += `<div class="detail-portal" style="color:#4a6880; border-color:#1a3050; border-style:dashed">⧗ Portal — To Be Identified</div>`;
  }

  html += `<div class="detail-divider"></div>`;
  html += `<div class="detail-section-title">Description</div>`;
  html += `<div class="detail-desc">${d.desc || 'No description available.'}</div>`;

  if (d.tags && d.tags.length > 0) {
    html += `<div class="detail-divider"></div>`;
    html += `<div class="detail-section-title">Status</div>`;
    d.tags.forEach(t => {
      html += `<span class="detail-tag ${t.cls}">${t.label}</span>`;
    });
  }

  if (node.children.length > 0) {
    html += `<div class="detail-divider"></div>`;
    html += `<div class="detail-section-title">Subsystems (${node.children.length})</div>`;
    node.children.forEach(c => {
      html += `<div style="font-size:10px; color:${c.color||'#0eb8cc'}; margin-bottom:4px; cursor:pointer" onclick="focusNode('${c.id}')">▶ ${c.code} — <span style="color:#4a6880">${(c.label||'').replace(/\n/g,' ')}</span></div>`;
    });
  }

  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail').classList.add('open');
  render();
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  state.selectedNode = null;
  render();
}

function focusNode(id) {
  const node = findNode(TREE, id);
  if (node) handleNodeClick(node);
}

function findNode(node, id) {
  if (node.id === id) return node;
  for (const c of node.children) {
    const found = findNode(c, id);
    if (found) return found;
  }
  return null;
}

// ─── PAN & ZOOM ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');

canvas.addEventListener('mousedown', e => {
  if (e.target.closest('.node')) return;
  state.drag.active = true;
  state.drag.startX = e.clientX;
  state.drag.startY = e.clientY;
  state.drag.panStart = { ...state.pan };
  canvas.classList.add('dragging');
});

window.addEventListener('mousemove', e => {
  if (!state.drag.active) return;
  state.pan.x = state.drag.panStart.x + (e.clientX - state.drag.startX);
  state.pan.y = state.drag.panStart.y + (e.clientY - state.drag.startY);
  render();
});

window.addEventListener('mouseup', () => {
  state.drag.active = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  state.pan.x = mx - (mx - state.pan.x) * delta;
  state.pan.y = my - (my - state.pan.y) * delta;
  state.zoom = Math.max(0.3, Math.min(3, state.zoom * delta));
  render();
}, { passive: false });

function zoomIn()  { state.zoom = Math.min(3, state.zoom * 1.2); render(); }
function zoomOut() { state.zoom = Math.max(0.3, state.zoom / 1.2); render(); }

function resetView() {
  state.zoom = 1;
  state.pan = { x: 0, y: 0 };
  state.openNodes = new Set(['msm', 'samplicity']);
  // Clear all node elements so they get recreated
  Object.values(state.nodeEls).forEach(el => el.remove());
  state.nodeEls = {};
  render();
}

function expandAll() {
  function addAll(node) {
    if (node.children.length > 0) state.openNodes.add(node.id);
    node.children.forEach(addAll);
  }
  addAll(TREE);
  render();
}

function collapseAll() {
  state.openNodes = new Set(['msm']);
  Object.values(state.nodeEls).forEach(el => el.remove());
  state.nodeEls = {};
  render();
}

// Touch support
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  } else if (e.touches.length === 1 && !e.target.closest('.node')) {
    state.drag.active = true;
    state.drag.startX = e.touches[0].clientX;
    state.drag.startY = e.touches[0].clientY;
    state.drag.panStart = { ...state.pan };
  }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (lastTouchDist) {
      const delta = dist / lastTouchDist;
      state.zoom = Math.max(0.3, Math.min(3, state.zoom * delta));
      render();
    }
    lastTouchDist = dist;
  } else if (e.touches.length === 1 && state.drag.active) {
    state.pan.x = state.drag.panStart.x + (e.touches[0].clientX - state.drag.startX);
    state.pan.y = state.drag.panStart.y + (e.touches[0].clientY - state.drag.startY);
    render();
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { state.drag.active = false; lastTouchDist = null; });

// ─── INIT ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', render);
render();
</script>
</body>
</html>
